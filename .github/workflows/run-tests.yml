name: KTrade CI

# Runs the full KTrade test suite on every push / PR. This is the zero-cost
# safety net for refactors (e.g. the monolith split): if any of the suites
# regress, the check goes red before the change lands.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # The test suites need only these. The heavy backtesting/research deps in
        # requirements.txt (vectorbt, yfinance, numba) are NOT needed to run the
        # suites and are slow / occasionally fragile to build on CI, so they are
        # intentionally omitted here. Swap the line below for
        #   pip install -r requirements.txt
        # if you want CI to build the full runtime environment.
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary numpy pandas flask flask-cors requests pydantic

      - name: Compile all modules
        run: python -m py_compile $(find . -name "*.py" -not -path "./.venv/*")

      - name: Release-safety check
        run: python scripts/check_release_safety.py

      - name: Run all test suites
        # IMPORTANT: KTrade suites are standalone scripts that sys.exit(1) on
        # failure — they are NOT pytest tests, so `pytest` would collect nothing and
        # pass falsely. They must be invoked as `python <file>`. A clean, isolated
        # app-data dir keeps the EmergencyController SQLite state from leaking
        # between suites (the determinism fix from v12.6).
        env:
          KTRADE_APP_DATA_DIR: ${{ github.workspace }}/.ci_appdata
          KTRADE_COPILOT_MODE: "off"
          KTRADE_REGIME_MODE: "off"
        run: |
          set -e
          rm -rf "$KTRADE_APP_DATA_DIR"
          mkdir -p "$KTRADE_APP_DATA_DIR"
          for t in $(ls test_v1*.py data/test_*.py | sort -u); do
            echo "::group::$t"
            python "$t"
            echo "::endgroup::"
          done
          echo "All KTrade suites passed."
