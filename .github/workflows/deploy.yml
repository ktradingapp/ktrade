name: Deploy KTrade to VPS

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, example: v13.9"
        required: true
        default: "v13.9"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build deploy zip
        run: |
          VERSION="${{ github.event.inputs.version }}"
          zip -r "Ktrade_${VERSION}_deploy.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".venv/*" \
            -x "venv/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "*.log" \
            -x "Ktrade_V*/*"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload zip to VPS
        run: |
          VERSION="${{ github.event.inputs.version }}"
          scp "Ktrade_${VERSION}_deploy.zip" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/Ktrade_${VERSION}_deploy.zip"

      - name: Deploy on VPS
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "/opt/deploy_ktrade_release.sh ${VERSION} /root/Ktrade_${VERSION}_deploy.zip"